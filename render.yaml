services:
  - type: web
    name: madrador60-stremio-addon
    env: node
    plan: free
    buildCommand: ""
    startCommand: node stremio/server.js
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PROVIDER_TIMEOUT_MS
        value: 45000
      - key: STREMIO_PROVIDERS
        value: frenchstream,movix,nakios,purstream,toflix,videasy
